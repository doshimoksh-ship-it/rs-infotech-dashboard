<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>R.S. Infotech — HRMS & Payroll Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--blue:#1a3a6e;--accent:#e8460a;--accent2:#f5a623;--light:#f4f6fb;--white:#fff;--text:#1e2a3a;--muted:#6b7a92;--border:#dde3ef;--green:#1a9e5c;--red:#d0342c;--amber:#c77c02}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;color:var(--text);background:var(--light);font-size:14px}
button{font-family:'Sora',sans-serif}
input,select,textarea{font-family:'Sora',sans-serif;font-size:13px;color:var(--text)}

/* ===== LOGIN ===== */
#loginPage{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy) 0%,#0e2147 55%,var(--blue) 100%);display:flex;align-items:center;justify-content:center;z-index:5000}
#loginPage::before{content:'';position:absolute;top:-100px;right:-100px;width:520px;height:520px;background:radial-gradient(circle,rgba(232,70,10,.15) 0%,transparent 70%);border-radius:50%}
.login-card{background:#fff;border-radius:18px;padding:44px 40px;width:400px;max-width:92vw;box-shadow:0 30px 80px rgba(0,0,0,.4);position:relative;z-index:2}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.logo-icon{width:44px;height:44px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:16px;flex-shrink:0}
.login-logo h1{font-family:'DM Serif Display',serif;font-size:24px;color:var(--navy)}
.login-card .sub{color:var(--muted);font-size:13px;margin-bottom:26px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--text);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;background:#fff;outline:none;transition:border .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,70,10,.1)}
.btn-sub{background:var(--accent);color:#fff;border:none;padding:13px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:background .2s;margin-top:6px}
.btn-sub:hover{background:#c93c08}
.login-hint{margin-top:16px;font-size:12px;color:var(--muted);text-align:center;background:var(--light);border-radius:8px;padding:10px}
.login-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;display:none}

/* ===== APP SHELL ===== */
#app{display:none}
.shell{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--navy);color:rgba(255,255,255,.65);flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:100;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo .logo-icon{width:36px;height:36px;font-size:13px}
.sb-logo-text{color:#fff;font-size:15px;font-weight:700;line-height:1.2}
.sb-logo-text span{display:block;color:var(--accent2);font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.sb-nav{padding:14px 10px;flex:1}
.sb-nav a{display:flex;align-items:center;gap:11px;padding:11px 14px;color:rgba(255,255,255,.6);text-decoration:none;font-size:13px;font-weight:500;border-radius:8px;margin-bottom:2px;cursor:pointer;transition:all .15s}
.sb-nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-nav a.active{background:var(--accent);color:#fff}
.sb-nav a .ic{width:20px;text-align:center;font-size:15px}
.sb-foot{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.3)}
.main{margin-left:230px;flex:1;min-width:0}
.topbar{background:#fff;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;box-shadow:0 1px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:50}
.topbar h2{font-size:17px;font-weight:700;color:var(--navy)}
.topbar-right{display:flex;align-items:center;gap:16px}
.top-date{font-size:12px;color:var(--muted)}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.btn-logout{border:1.5px solid var(--border);background:#fff;color:var(--muted);padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .2s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.content{padding:26px 28px}

/* ===== COMPONENTS ===== */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(10,22,40,.06)}
.card h3{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;text-transform:uppercase;letter-spacing:.8px}
.stat{display:flex;align-items:center;gap:14px}
.stat-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.stat-num{font-size:24px;font-weight:700;color:var(--navy);line-height:1.1}
.stat-lbl{font-size:12px;color:var(--muted)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:10px 12px;border-bottom:1.5px solid var(--border)}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--light);font-size:13px}
.tbl tr:hover td{background:#fafbfe}
.tbl .num{text-align:right}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-green{background:#e3f6ec;color:var(--green)}
.b-red{background:#fdeae9;color:var(--red)}
.b-amber{background:#fdf3e0;color:var(--amber)}
.b-blue{background:#e8eefb;color:var(--blue)}
.b-grey{background:#eef1f6;color:var(--muted)}
.btn{border:none;border-radius:7px;padding:9px 16px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-red{background:var(--accent);color:#fff}
.btn-red:hover{background:#c93c08}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:5px 10px;font-size:11.5px;border-radius:6px}
.btn-green{background:var(--green);color:#fff}
.btn-danger{background:#fff;border:1.5px solid #f3c3c0;color:var(--red)}
.btn-danger:hover{background:#fdeae9}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.page-head h2{font-family:'DM Serif Display',serif;font-size:26px;color:var(--navy)}
.page-head .sub2{font-size:13px;color:var(--muted);margin-top:2px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search-inp{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;width:220px;outline:none}
.search-inp:focus{border-color:var(--accent)}
.sel{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:#fff;outline:none;cursor:pointer}
.mt{margin-top:16px}
.empty{text-align:center;color:var(--muted);padding:36px 10px;font-size:13px}

/* bars & chart */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{width:90px;font-size:12px;color:var(--text);flex-shrink:0}
.bar-track{flex:1;height:9px;background:var(--light);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px}
.bar-val{width:26px;font-size:12px;font-weight:700;color:var(--navy);text-align:right}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(10,22,40,.55);display:none;align-items:flex-start;justify-content:center;z-index:2000;padding:40px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:640px;max-width:100%;box-shadow:0 30px 80px rgba(0,0,0,.35);animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.modal h3{font-family:'DM Serif Display',serif;font-size:21px;color:var(--navy);margin-bottom:18px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:13px 20px;border-radius:10px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:3000;display:none}

/* payslip */
.payslip{border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.ps-head{background:var(--navy);color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center}
.ps-head h4{font-family:'DM Serif Display',serif;font-size:19px}
.ps-head .ps-co{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px}
.ps-month{background:var(--accent);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700}
.ps-body{padding:20px 22px}
.ps-emp{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;margin-bottom:16px;font-size:12.5px}
.ps-emp b{color:var(--navy)}
.ps-tables{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ps-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.ps-tbl th{background:var(--light);padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted)}
.ps-tbl th:last-child,.ps-tbl td:last-child{text-align:right}
.ps-tbl td{padding:7px 10px;border-bottom:1px solid var(--light)}
.ps-tbl .tot td{font-weight:700;color:var(--navy);border-top:1.5px solid var(--border)}
.ps-net{margin-top:16px;background:#e3f6ec;border-radius:10px;padding:13px 16px;display:flex;justify-content:space-between;font-weight:700;color:var(--green);font-size:15px}

@media print{
  body *{visibility:hidden}
  #payslipPrint,#payslipPrint *{visibility:visible}
  #payslipPrint{position:absolute;left:0;top:0;width:100%}
  .modal-actions{display:none!important}
}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:820px){.sidebar{display:none}.main{margin-left:0}.grid-2,.grid-3{grid-template-columns:1fr}.f-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo"><div class="logo-icon">RS</div><h1>R.S. Infotech</h1></div>
    <div class="sub">HRMS &amp; Payroll Portal — Sign in to continue</div>
    <div class="fg"><label>Username</label><input id="loginUser" placeholder="admin" autocomplete="username"></div>
    <div class="fg"><label>Password</label><input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-sub" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="loginErr">Invalid username or password</div>
    <div class="login-hint">Demo login — user: <b>admin</b> &nbsp;·&nbsp; password: <b>rs@123</b></div>
  </div>
</div>

<!-- APP -->
<div id="app">
<div class="shell">
  <aside class="sidebar">
    <div class="sb-logo"><div class="logo-icon">RS</div><div class="sb-logo-text">R.S. Infotech<span>HRMS · Payroll</span></div></div>
    <nav class="sb-nav" id="sbNav">
      <a data-page="dashboard" class="active"><span class="ic">▦</span> Dashboard</a>
      <a data-page="employees"><span class="ic">👥</span> Employees</a>
      <a data-page="attendance"><span class="ic">🕘</span> Attendance</a>
      <a data-page="leave"><span class="ic">🌴</span> Leave</a>
      <a data-page="payroll"><span class="ic">₹</span> Payroll</a>
      <a data-page="reports"><span class="ic">📊</span> Reports</a>
      <a data-page="settings"><span class="ic">⚙</span> Settings</a>
    </nav>
    <div class="sb-foot">© R.S. Infotech, Vadodara<br>v1.0</div>
  </aside>
  <div class="main">
    <div class="topbar">
      <h2 id="topTitle">Dashboard</h2>
      <div class="topbar-right">
        <span class="top-date" id="topDate"></span>
        <div class="avatar">AD</div>
        <button class="btn-logout" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ================= STATE ================= */
const LS_KEY='rsinfotech_hrms_v1';
const DEPTS=['Sales','Service','Technical','Accounts','Admin'];
const LEAVE_TYPES=['Casual Leave','Sick Leave','Earned Leave','Leave Without Pay'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
let S=null;

function todayStr(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function monthKey(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function fmtDate(s){if(!s)return'—';const[y,m,dd]=s.split('-');return dd+' '+MONTHS[+m-1].slice(0,3)+' '+y;}
function fmtMoney(n){return '₹'+Math.round(n).toLocaleString('en-IN');}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uid(){return 'id'+Math.random().toString(36).slice(2,9);}

function seed(){
  const emps=[
    {name:'Rajesh Shah',dept:'Admin',desig:'Director',basic:60000,doj:'2015-04-01',dob:'1975-08-14',phone:'98250 11001',email:'rajesh@rsinfotech.in'},
    {name:'Priya Patel',dept:'Accounts',desig:'Accounts Manager',basic:32000,doj:'2018-06-11',dob:'1990-07-09',phone:'98250 11002',email:'priya@rsinfotech.in'},
    {name:'Amit Desai',dept:'Sales',desig:'Sales Executive',basic:22000,doj:'2020-01-20',dob:'1994-03-22',phone:'98250 11003',email:'amit@rsinfotech.in'},
    {name:'Sneha Joshi',dept:'Sales',desig:'Sales Executive',basic:21000,doj:'2021-09-01',dob:'1996-11-30',phone:'98250 11004',email:'sneha@rsinfotech.in'},
    {name:'Karan Mehta',dept:'Technical',desig:'Sr. Engineer',basic:28000,doj:'2019-03-15',dob:'1992-01-17',phone:'98250 11005',email:'karan@rsinfotech.in'},
    {name:'Vishal Rana',dept:'Technical',desig:'Engineer',basic:19000,doj:'2022-07-04',dob:'1998-05-25',phone:'98250 11006',email:'vishal@rsinfotech.in'},
    {name:'Deepak Solanki',dept:'Service',desig:'Service Engineer',basic:17000,doj:'2022-11-14',dob:'1997-09-02',phone:'98250 11007',email:'deepak@rsinfotech.in'},
    {name:'Hetal Vyas',dept:'Service',desig:'Support Executive',basic:15000,doj:'2023-02-06',dob:'1999-12-12',phone:'98250 11008',email:'hetal@rsinfotech.in'},
  ].map((e,i)=>({id:uid(),code:'RS'+String(101+i),status:'Active',bank:'HDFC ••'+ (4210+i*7),...e}));

  // attendance: last 35 days
  const att={};
  for(let i=34;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    if(d.getDay()===0)continue; // Sunday off
    const key=todayStr(d),day={};
    emps.forEach(e=>{
      const r=Math.random();
      if(r<0.08)day[e.id]={status:'A'};
      else if(r<0.13)day[e.id]={status:'L'};
      else if(r<0.18)day[e.id]={status:'HD',in:'09:'+(30+Math.floor(Math.random()*25)),out:'13:30'};
      else day[e.id]={status:'P',in:'09:'+(15+Math.floor(Math.random()*40)),out:'18:'+(10+Math.floor(Math.random()*40))};
    });
    att[key]=day;
  }
  // leaves
  const t=new Date();
  const leaves=[
    {id:uid(),empId:emps[3].id,type:'Casual Leave',from:todayStr(new Date(t.getTime()+2*864e5)),to:todayStr(new Date(t.getTime()+3*864e5)),days:2,reason:'Family function',status:'Pending',applied:todayStr()},
    {id:uid(),empId:emps[6].id,type:'Sick Leave',from:todayStr(new Date(t.getTime()+1*864e5)),to:todayStr(new Date(t.getTime()+1*864e5)),days:1,reason:'Fever',status:'Pending',applied:todayStr()},
    {id:uid(),empId:emps[4].id,type:'Earned Leave',from:todayStr(new Date(t.getTime()-6*864e5)),to:todayStr(new Date(t.getTime()-4*864e5)),days:3,reason:'Out of station',status:'Approved',applied:todayStr(new Date(t.getTime()-10*864e5))},
  ];
  return {
    company:{name:'R.S. Infotech',address:'Vadodara, Gujarat',phone:'+91 265 2xx xxxx',email:'info@rsinfotech.in'},
    settings:{hraPct:40,convAmt:1600,medAmt:1250,pfPct:12,esicPct:0.75,esicLimit:21000,ptAmt:200,ptLimit:12000},
    employees:emps,attendance:att,leaves:leaves,payrolls:{}
  };
}
function load(){try{const raw=localStorage.getItem(LS_KEY);S=raw?JSON.parse(raw):seed();}catch(e){S=seed();}save();}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(S));}
function emp(id){return S.employees.find(e=>e.id===id);}
function activeEmps(){return S.employees.filter(e=>e.status==='Active');}

/* ================= SALARY CALC ================= */
function calcSalary(e,presentDays,workDays){
  const st=S.settings, ratio=workDays>0?presentDays/workDays:1;
  const basic=Math.round(e.basic*ratio);
  const hra=Math.round(basic*st.hraPct/100);
  const conv=Math.round(st.convAmt*ratio);
  const med=Math.round(st.medAmt*ratio);
  const gross=basic+hra+conv+med;
  const pf=Math.round(basic*st.pfPct/100);
  const esic=(e.basic+e.basic*st.hraPct/100+st.convAmt+st.medAmt)<=st.esicLimit?Math.round(gross*st.esicPct/100):0;
  const pt=e.basic>st.ptLimit?st.ptAmt:0;
  const ded=pf+esic+pt;
  return {basic,hra,conv,med,gross,pf,esic,pt,ded,net:gross-ded,presentDays,workDays};
}
function monthAttSummary(mk){
  const tk=todayStr();
  const res={},days=Object.keys(S.attendance).filter(d=>d.startsWith(mk)&&d<=tk);
  S.employees.forEach(e=>{
    let p=0;
    days.forEach(d=>{const a=S.attendance[d][e.id];if(!a)return;if(a.status==='P'||a.status==='L')p+=1;else if(a.status==='HD')p+=0.5;});
    res[e.id]={present:p,workDays:days.length};
  });
  res._workDays=days.length;
  return res;
}

/* ================= NAV / SHELL ================= */
const TITLES={dashboard:'Dashboard',employees:'Employees',attendance:'Attendance',leave:'Leave Management',payroll:'Payroll',reports:'Reports',settings:'Settings'};
let PAGE='dashboard';
function nav(p){PAGE=p;document.querySelectorAll('#sbNav a').forEach(a=>a.classList.toggle('active',a.dataset.page===p));document.getElementById('topTitle').textContent=TITLES[p];render();}
document.getElementById('sbNav').addEventListener('click',e=>{const a=e.target.closest('a');if(a)nav(a.dataset.page);});
function render(){
  const c=document.getElementById('content');
  if(PAGE==='dashboard')c.innerHTML=vDashboard();
  else if(PAGE==='employees')c.innerHTML=vEmployees();
  else if(PAGE==='attendance')c.innerHTML=vAttendance();
  else if(PAGE==='leave')c.innerHTML=vLeave();
  else if(PAGE==='payroll')c.innerHTML=vPayroll();
  else if(PAGE==='reports')c.innerHTML=vReports();
  else if(PAGE==='settings')c.innerHTML=vSettings();
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2600);}
function openModal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('modalBg').classList.add('open');}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal();});

/* ================= LOGIN ================= */
function doLogin(){
  const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value;
  if(u==='admin'&&p==='rs@123'){sessionStorage.setItem('rs_auth','1');showApp();}
  else document.getElementById('loginErr').style.display='block';
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout(){sessionStorage.removeItem('rs_auth');location.reload();}
function showApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='block';
  const d=new Date();
  document.getElementById('topDate').textContent=d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  nav('dashboard');
}

/* ================= DASHBOARD ================= */
function vDashboard(){
  const tk=todayStr(),tAtt=S.attendance[tk]||{};
  const emps=activeEmps();
  let present=0,absent=0,onLeave=0,half=0;
  emps.forEach(e=>{const a=tAtt[e.id];if(!a){absent++;return;}if(a.status==='P')present++;else if(a.status==='A')absent++;else if(a.status==='L')onLeave++;else if(a.status==='HD')half++;});
  const pendLeaves=S.leaves.filter(l=>l.status==='Pending');
  const mk=monthKey();
  const payRun=S.payrolls[mk];
  const monthPay=payRun?payRun.reduce((s,r)=>s+r.net,0):0;

  // dept distribution
  const byDept={};DEPTS.forEach(d=>byDept[d]=0);emps.forEach(e=>byDept[e.dept]=(byDept[e.dept]||0)+1);
  const maxD=Math.max(1,...Object.values(byDept));
  const deptBars=DEPTS.map(d=>`<div class="bar-row"><div class="bar-lbl">${d}</div><div class="bar-track"><div class="bar-fill" style="width:${byDept[d]/maxD*100}%"></div></div><div class="bar-val">${byDept[d]}</div></div>`).join('');

  // 14-day attendance trend (SVG)
  const days=Object.keys(S.attendance).filter(d=>d<=tk).sort().slice(-14);
  const pts=days.map(d=>{let p=0;emps.forEach(e=>{const a=S.attendance[d][e.id];if(a&&(a.status==='P'||a.status==='HD'))p++;});return p;});
  const W=560,H=140,mx=Math.max(1,emps.length);
  const poly=pts.map((p,i)=>((i/(Math.max(1,pts.length-1)))*W).toFixed(1)+','+(H-(p/mx)*(H-20)).toFixed(1)).join(' ');
  const trend=`<svg viewBox="0 0 ${W} ${H+18}" style="width:100%"><polyline points="${poly}" fill="none" stroke="#e8460a" stroke-width="2.5" stroke-linejoin="round"/>${pts.map((p,i)=>`<circle cx="${((i/(Math.max(1,pts.length-1)))*W).toFixed(1)}" cy="${(H-(p/mx)*(H-20)).toFixed(1)}" r="3.5" fill="#e8460a"/>`).join('')}${days.map((d,i)=>i%2?'':`<text x="${((i/(Math.max(1,pts.length-1)))*W).toFixed(1)}" y="${H+14}" font-size="9" fill="#6b7a92" text-anchor="middle">${d.slice(8)}/${d.slice(5,7)}</text>`).join('')}</svg>`;

  // today's in/out
  const rows=emps.map(e=>{const a=tAtt[e.id];const st=a?a.status:'A';
    const badge=st==='P'?'<span class="badge b-green">Present</span>':st==='HD'?'<span class="badge b-amber">Half Day</span>':st==='L'?'<span class="badge b-blue">On Leave</span>':'<span class="badge b-red">Absent</span>';
    return `<tr><td><b>${esc(e.name)}</b><br><span style="font-size:11px;color:var(--muted)">${esc(e.dept)}</span></td><td>${a&&a.in?a.in:'—'}</td><td>${a&&a.out?a.out:'—'}</td><td>${badge}</td></tr>`;}).join('');

  // birthdays this month
  const m=String(new Date().getMonth()+1).padStart(2,'0');
  const bdays=emps.filter(e=>e.dob&&e.dob.slice(5,7)===m).map(e=>`<tr><td><b>${esc(e.name)}</b></td><td>${fmtDate(e.dob.replace(/^\d{4}/,new Date().getFullYear()))}</td></tr>`).join('');

  return `
  <div class="grid-4">
    <div class="card stat"><div class="stat-ic" style="background:#e8eefb">👥</div><div><div class="stat-num">${emps.length}</div><div class="stat-lbl">Active Employees</div></div></div>
    <div class="card stat"><div class="stat-ic" style="background:#e3f6ec">✅</div><div><div class="stat-num">${present+half}</div><div class="stat-lbl">Present Today</div></div></div>
    <div class="card stat"><div class="stat-ic" style="background:#fdf3e0">🌴</div><div><div class="stat-num">${onLeave} <span style="font-size:13px;color:var(--muted)">/ ${pendLeaves.length} pending</span></div><div class="stat-lbl">On Leave · Requests</div></div></div>
    <div class="card stat"><div class="stat-ic" style="background:#fdeae9">₹</div><div><div class="stat-num" style="font-size:19px">${payRun?fmtMoney(monthPay):'Not run'}</div><div class="stat-lbl">${MONTHS[new Date().getMonth()]} Payroll</div></div></div>
  </div>
  <div class="grid-2 mt">
    <div class="card"><h3>Attendance Trend — Last 14 Working Days</h3>${trend}</div>
    <div class="card"><h3>Employees by Department</h3>${deptBars}
      <h3 class="mt">Birthdays This Month</h3>
      ${bdays?`<table class="tbl"><tbody>${bdays}</tbody></table>`:'<div class="empty">No birthdays this month</div>'}
    </div>
  </div>
  <div class="grid-2 mt">
    <div class="card"><h3>Today's In / Out — ${fmtDate(tk)}</h3><table class="tbl"><thead><tr><th>Employee</th><th>In</th><th>Out</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="card"><h3>Pending Leave Requests</h3>
      ${pendLeaves.length?`<table class="tbl"><thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th></th></tr></thead><tbody>${pendLeaves.map(l=>`<tr><td><b>${esc(emp(l.empId)?.name||'?')}</b></td><td>${esc(l.type)}</td><td>${fmtDate(l.from)} → ${fmtDate(l.to)}</td><td><button class="btn btn-green btn-sm" onclick="leaveAction('${l.id}','Approved')">Approve</button> <button class="btn btn-danger btn-sm" onclick="leaveAction('${l.id}','Rejected')">Reject</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty">No pending requests 🎉</div>'}
    </div>
  </div>`;
}

/* ================= EMPLOYEES ================= */

    <td><b>${esc(e.code)}</b></td>

    <td>${esc(e.dept)}</td><td>${esc(e.desig)}</td>
    <td>${fmtDate(e.doj)}</td><td class="num">${fmtMoney(e.basic)}</td>
    <td>${e.status==='Active'?'<span class="badge b-green">Active</span>':'<span class="badge b-grey">Inactive</span>'}</td>
    <td style="white-space:nowrap"><button class="btn btn-outline btn-sm" onclick="empForm('${e.id}')">Edit</button> <button class="btn btn-danger btn-sm" onclick="empDelete('${e.id}')">Delete</button></td>
  </tr>`).join('');
  return `<div class="page-head"><div><h2>Employees</h2><div class="sub2">${S.employees.length} total · ${activeEmps().length} active</div></div>
    <div class="toolbar">
      <input class="search-inp" placeholder="Search name / code…" value="${esc(empSearch)}" oninput="empSearch=this.value;render();this.focus();this.setSelectionRange(99,99)">
      <select class="sel" onchange="empDept=this.value;render()"><option value="">All Departments</option>${DEPTS.map(d=>`<option ${empDept===d?'selected':''}>${d}</option>`).join('')}</select>
      <button class="btn btn-red" onclick="empForm()">＋ Add Employee</button>
    </div></div>
  <div class="card">${list.length?`<table class="tbl"><thead><tr><th>Code</th><th>Name</th><th>Department</th><th>Designation</th><th>Joined</th><th class="num">Basic / mo</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty">No employees match.</div>'}</div>`;
}
function empForm(id){
  const e=id?emp(id):{code:'RS'+String(101+S.employees.length),name:'',dept:DEPTS[0],desig:'',basic:15000,doj:todayStr(),dob:'',phone:'',email:'',bank:'',status:'Active'};
  openModal(`<h3>${id?'Edit':'Add'} Employee</h3>
  <div class="f-row"><div class="fg"><label>Emp Code</label><input id="f_code" value="${esc(e.code)}"></div><div class="fg"><label>Full Name</label><input id="f_name" value="${esc(e.name)}"></div></div>
  <div class="f-row"><div class="fg"><label>Department</label><select id="f_dept">${DEPTS.map(d=>`<option ${e.dept===d?'selected':''}>${d}</option>`).join('')}</select></div><div class="fg"><label>Designation</label><input id="f_desig" value="${esc(e.desig)}"></div></div>
  <div class="f-row"><div class="fg"><label>Date of Joining</label><input id="f_doj" type="date" value="${e.doj}"></div><div class="fg"><label>Date of Birth</label><input id="f_dob" type="date" value="${e.dob}"></div></div>
  <div class="f-row"><div class="fg"><label>Phone</label><input id="f_phone" value="${esc(e.phone)}"></div><div class="fg"><label>Email</label><input id="f_email" value="${esc(e.email)}"></div></div>
  <div class="f-row"><div class="fg"><label>Basic Salary (₹/month)</label><input id="f_basic" type="number" value="${e.basic}"></div><div class="fg"><label>Bank A/c</label><input id="f_bank" value="${esc(e.bank)}"></div></div>
  <div class="fg"><label>Status</label><select id="f_status"><option ${e.status==='Active'?'selected':''}>Active</option><option ${e.status==='Inactive'?'selected':''}>Inactive</option></select></div>
  <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-red" onclick="empSave('${id||''}')">Save</button></div>`);
}
function empSave(id){
  const g=x=>document.getElementById('f_'+x).value;
  if(!g('name').trim()){toast('Name is required');return;}
  const data={code:g('code'),name:g('name').trim(),dept:g('dept'),desig:g('desig'),doj:g('doj'),dob:g('dob'),phone:g('phone'),email:g('email'),basic:+g('basic')||0,bank:g('bank'),status:g('status')};
  if(id)Object.assign(emp(id),data);else S.employees.push({id:uid(),...data});
  save();closeModal();render();toast(id?'Employee updated':'Employee added');
}
function empDelete(id){
  const e=emp(id);
  if(!confirm('Delete '+e.name+'? Attendance & payroll history for this employee will also be removed.'))return;
  S.employees=S.employees.filter(x=>x.id!==id);
  Object.values(S.attendance).forEach(d=>delete d[id]);
  S.leaves=S.leaves.filter(l=>l.empId!==id);
  save();render();toast('Employee deleted');
}

/* ================= ATTENDANCE ================= */
let attDate=todayStr();
function vAttendance(){
  const day=S.attendance[attDate]||{};
  const isSun=new Date(attDate+'T00:00').getDay()===0;
  const rows=activeEmps().map(e=>{
    const a=day[e.id]||{};
    const st=a.status||'A';
    return `<tr><td><b>${esc(e.name)}</b><br><span style="font-size:11px;color:var(--muted)">${esc(e.code)} · ${esc(e.dept)}</span></td>
      <td><input type="time" value="${a.in||''}" onchange="attSet('${e.id}','in',this.value)" style="padding:6px;border:1.5px solid var(--border);border-radius:6px"></td>
      <td><input type="time" value="${a.out||''}" onchange="attSet('${e.id}','out',this.value)" style="padding:6px;border:1.5px solid var(--border);border-radius:6px"></td>
      <td><select class="sel" onchange="attSet('${e.id}','status',this.value)">
        <option value="P" ${st==='P'?'selected':''}>Present</option>
        <option value="HD" ${st==='HD'?'selected':''}>Half Day</option>
        <option value="L" ${st==='L'?'selected':''}>On Leave</option>
        <option value="A" ${st==='A'?'selected':''}>Absent</option>
      </select></td></tr>`;}).join('');
  // monthly register
  const mk=attDate.slice(0,7);
  const days=Object.keys(S.attendance).filter(d=>d.startsWith(mk)).sort();
  const reg=activeEmps().map(e=>{
    let p=0,a=0,l=0,hd=0;
    days.forEach(d=>{const x=S.attendance[d][e.id];if(!x||x.status==='A')a++;else if(x.status==='P')p++;else if(x.status==='L')l++;else if(x.status==='HD')hd++;});
    return `<tr><td><b>${esc(e.name)}</b></td><td class="num">${p}</td><td class="num">${hd}</td><td class="num">${l}</td><td class="num">${a}</td><td class="num"><b>${p+hd*0.5+l}</b></td></tr>`;}).join('');
  return `<div class="page-head"><div><h2>Attendance</h2><div class="sub2">Mark daily in/out times and status</div></div>
    <div class="toolbar"><input type="date" class="sel" value="${attDate}" onchange="attDate=this.value;render()">
    <button class="btn btn-outline" onclick="attAllPresent()">Mark All Present</button></div></div>
  ${isSun?'<div class="card" style="border-left:4px solid var(--accent2);margin-bottom:16px">📅 Selected date is a <b>Sunday</b> (weekly off). You can still mark attendance if needed.</div>':''}
  <div class="grid-2" style="grid-template-columns:1.3fr 1fr;align-items:start">
    <div class="card"><h3>Daily Marking — ${fmtDate(attDate)}</h3><table class="tbl"><thead><tr><th>Employee</th><th>In</th><th>Out</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="card"><h3>Monthly Register — ${MONTHS[+mk.slice(5)-1]} ${mk.slice(0,4)} (${days.length} marked days)</h3>
      <table class="tbl"><thead><tr><th>Employee</th><th class="num">P</th><th class="num">½</th><th class="num">Leave</th><th class="num">Abs</th><th class="num">Payable</th></tr></thead><tbody>${reg}</tbody></table></div>
  </div>`;
}
function attSet(empId,field,val){
  if(!S.attendance[attDate])S.attendance[attDate]={};
  if(!S.attendance[attDate][empId])S.attendance[attDate][empId]={status:'P'};
  S.attendance[attDate][empId][field]=val;
  if(field==='status'&&val==='A'){delete S.attendance[attDate][empId].in;delete S.attendance[attDate][empId].out;}
  save();
}
function attAllPresent(){
  if(!S.attendance[attDate])S.attendance[attDate]={};
  activeEmps().forEach(e=>{const cur=S.attendance[attDate][e.id];if(!cur||cur.status==='A')S.attendance[attDate][e.id]={status:'P',in:'09:30',out:'18:30'};});
  save();render();toast('All marked present');
}

/* ================= LEAVE ================= */
function vLeave(){
  const rows=[...S.leaves].reverse().map(l=>{const e=emp(l.empId);
    const b=l.status==='Approved'?'b-green':l.status==='Rejected'?'b-red':'b-amber';
    return `<tr><td><b>${esc(e?e.name:'?')}</b></td><td>${esc(l.type)}</td><td>${fmtDate(l.from)} → ${fmtDate(l.to)}</td><td class="num">${l.days}</td><td>${esc(l.reason)}</td>
    <td><span class="badge ${b}">${l.status}</span></td>
    <td style="white-space:nowrap">${l.status==='Pending'?`<button class="btn btn-green btn-sm" onclick="leaveAction('${l.id}','Approved')">Approve</button> <button class="btn btn-danger btn-sm" onclick="leaveAction('${l.id}','Rejected')">Reject</button>`:''}</td></tr>`;}).join('');
  return `<div class="page-head"><div><h2>Leave Management</h2><div class="sub2">${S.leaves.filter(l=>l.status==='Pending').length} pending requests</div></div>
    <button class="btn btn-red" onclick="leaveForm()">＋ Apply Leave</button></div>
  <div class="card">${S.leaves.length?`<table class="tbl"><thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th class="num">Days</th><th>Reason</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty">No leave records yet.</div>'}</div>`;
}
function leaveForm(){
  openModal(`<h3>Apply Leave</h3>
  <div class="fg"><label>Employee</label><select id="l_emp">${activeEmps().map(e=>`<option value="${e.id}">${esc(e.name)} (${esc(e.code)})</option>`).join('')}</select></div>
  <div class="f-row"><div class="fg"><label>Leave Type</label><select id="l_type">${LEAVE_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div><div class="fg"><label>&nbsp;</label><span style="font-size:12px;color:var(--muted)">Sundays not counted automatically — enter actual days.</span></div></div>
  <div class="f-row"><div class="fg"><label>From</label><input id="l_from" type="date" value="${todayStr()}"></div><div class="fg"><label>To</label><input id="l_to" type="date" value="${todayStr()}"></div></div>
  <div class="fg"><label>Reason</label><textarea id="l_reason" rows="2"></textarea></div>
  <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-red" onclick="leaveSave()">Submit</button></div>`);
}
function leaveSave(){
  const g=x=>document.getElementById('l_'+x).value;
  const from=g('from'),to=g('to');
  if(!from||!to||to<from){toast('Check the dates');return;}
  const days=Math.round((new Date(to)-new Date(from))/864e5)+1;
  S.leaves.push({id:uid(),empId:g('emp'),type:g('type'),from,to,days,reason:g('reason'),status:'Pending',applied:todayStr()});
  save();closeModal();render();toast('Leave request submitted');
}
function leaveAction(id,status){
  const l=S.leaves.find(x=>x.id===id);l.status=status;
  if(status==='Approved'){ // mark attendance as leave for the range
    let d=new Date(l.from+'T00:00');const end=new Date(l.to+'T00:00');
    while(d<=end){const k=todayStr(d);if(d.getDay()!==0){if(!S.attendance[k])S.attendance[k]={};S.attendance[k][l.empId]={status:'L'};}d.setDate(d.getDate()+1);}
  }
  save();render();toast('Leave '+status.toLowerCase());
}

/* ================= PAYROLL ================= */
let payMonth=monthKey();
function vPayroll(){
  const run=S.payrolls[payMonth];
  const att=monthAttSummary(payMonth);
  const label=MONTHS[+payMonth.slice(5)-1]+' '+payMonth.slice(0,4);
  // month options: last 12
  const opts=[];for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()-i);const k=monthKey(d);opts.push(`<option value="${k}" ${k===payMonth?'selected':''}>${MONTHS[d.getMonth()]} ${d.getFullYear()}</option>`);}
  let body;
  if(run){
    const tot=run.reduce((a,r)=>({gross:a.gross+r.gross,ded:a.ded+r.ded,net:a.net+r.net}),{gross:0,ded:0,net:0});
    body=`<div class="card"><h3>Salary Register — ${label} <span class="badge b-green" style="margin-left:8px">Processed</span></h3>
    <table class="tbl"><thead><tr><th>Employee</th><th class="num">Days</th><th class="num">Basic</th><th class="num">HRA</th><th class="num">Allow.</th><th class="num">Gross</th><th class="num">PF</th><th class="num">ESIC</th><th class="num">PT</th><th class="num">Net Pay</th><th></th></tr></thead><tbody>
    ${run.map(r=>{const e=emp(r.empId);return `<tr><td><b>${esc(e?e.name:'?')}</b></td><td class="num">${r.presentDays}/${r.workDays}</td><td class="num">${fmtMoney(r.basic)}</td><td class="num">${fmtMoney(r.hra)}</td><td class="num">${fmtMoney(r.conv+r.med)}</td><td class="num">${fmtMoney(r.gross)}</td><td class="num">${fmtMoney(r.pf)}</td><td class="num">${fmtMoney(r.esic)}</td><td class="num">${fmtMoney(r.pt)}</td><td class="num"><b style="color:var(--green)">${fmtMoney(r.net)}</b></td>
    <td><button class="btn btn-outline btn-sm" onclick="showPayslip('${r.empId}','${payMonth}')">Payslip</button></td></tr>`;}).join('')}
    <tr style="background:var(--light)"><td><b>Total</b></td><td></td><td></td><td></td><td></td><td class="num"><b>${fmtMoney(tot.gross)}</b></td><td></td><td></td><td></td><td class="num"><b>${fmtMoney(tot.net)}</b></td><td></td></tr>
    </tbody></table>
    <div class="mt"><button class="btn btn-outline" onclick="csvPayroll()">⬇ Export CSV</button> <button class="btn btn-danger" onclick="payrollUndo()">Undo Run</button></div></div>`;
  }else{
    const preview=activeEmps().map(e=>{const a=att[e.id]||{present:0,workDays:att._workDays};const c=calcSalary(e,a.present,a.workDays||att._workDays);
      return `<tr><td><b>${esc(e.name)}</b></td><td class="num">${a.present}/${att._workDays}</td><td class="num">${fmtMoney(c.gross)}</td><td class="num">${fmtMoney(c.ded)}</td><td class="num"><b>${fmtMoney(c.net)}</b></td></tr>`;}).join('');
    body=`<div class="card"><h3>Preview — ${label} (${att._workDays} working days marked)</h3>
    ${att._workDays?`<table class="tbl"><thead><tr><th>Employee</th><th class="num">Payable Days</th><th class="num">Gross</th><th class="num">Deductions</th><th class="num">Net Pay</th></tr></thead><tbody>${preview}</tbody></table>
    <div class="mt"><button class="btn btn-red" onclick="payrollRun()">⚡ Process Payroll for ${label}</button></div>`
    :'<div class="empty">No attendance marked for this month — mark attendance first, then process payroll.</div>'}</div>`;
  }
  return `<div class="page-head"><div><h2>Payroll</h2><div class="sub2">Attendance-linked salary processing with PF, ESIC &amp; PT</div></div>
    <select class="sel" onchange="payMonth=this.value;render()">${opts.join('')}</select></div>${body}`;
}
function payrollRun(){
  const att=monthAttSummary(payMonth);
  if(!att._workDays){toast('No attendance for this month');return;}
  S.payrolls[payMonth]=activeEmps().map(e=>{const a=att[e.id];return {empId:e.id,...calcSalary(e,a.present,a.workDays)};});
  save();render();toast('Payroll processed for '+payMonth);
}
function payrollUndo(){if(!confirm('Undo this payroll run?'))return;delete S.payrolls[payMonth];save();render();toast('Payroll run removed');}
function showPayslip(empId,mk){
  const r=S.payrolls[mk].find(x=>x.empId===empId),e=emp(empId);
  const label=MONTHS[+mk.slice(5)-1]+' '+mk.slice(0,4);
  openModal(`<div id="payslipPrint"><div class="payslip">
    <div class="ps-head"><div><h4>R.S. Infotech</h4><div class="ps-co">${esc(S.company.address)} · ${esc(S.company.email)}</div></div><div class="ps-month">PAYSLIP · ${label}</div></div>
    <div class="ps-body">
      <div class="ps-emp">
        <div><b>Employee:</b> ${esc(e.name)}</div><div><b>Emp Code:</b> ${esc(e.code)}</div>
        <div><b>Designation:</b> ${esc(e.desig)}</div><div><b>Department:</b> ${esc(e.dept)}</div>
        <div><b>Bank A/c:</b> ${esc(e.bank||'—')}</div><div><b>Paid Days:</b> ${r.presentDays} / ${r.workDays}</div>
      </div>
      <div class="ps-tables">
        <table class="ps-tbl"><thead><tr><th>Earnings</th><th>Amount</th></tr></thead><tbody>
          <tr><td>Basic Salary</td><td>${fmtMoney(r.basic)}</td></tr>
          <tr><td>HRA</td><td>${fmtMoney(r.hra)}</td></tr>
          <tr><td>Conveyance</td><td>${fmtMoney(r.conv)}</td></tr>
          <tr><td>Medical Allowance</td><td>${fmtMoney(r.med)}</td></tr>
          <tr class="tot"><td>Gross Earnings</td><td>${fmtMoney(r.gross)}</td></tr>
        </tbody></table>
        <table class="ps-tbl"><thead><tr><th>Deductions</th><th>Amount</th></tr></thead><tbody>
          <tr><td>Provident Fund (PF)</td><td>${fmtMoney(r.pf)}</td></tr>
          <tr><td>ESIC</td><td>${fmtMoney(r.esic)}</td></tr>
          <tr><td>Professional Tax</td><td>${fmtMoney(r.pt)}</td></tr>
          <tr><td>&nbsp;</td><td></td></tr>
          <tr class="tot"><td>Total Deductions</td><td>${fmtMoney(r.ded)}</td></tr>
        </tbody></table>
      </div>
      <div class="ps-net"><span>NET PAY</span><span>${fmtMoney(r.net)}</span></div>
    </div>
  </div></div>
  <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Close</button><button class="btn btn-red" onclick="window.print()">🖨 Print / PDF</button></div>`);
}
function csvPayroll(){
  const run=S.payrolls[payMonth];if(!run)return;
  let csv='Employee,Code,Days,Basic,HRA,Conveyance,Medical,Gross,PF,ESIC,PT,Net\n';
  run.forEach(r=>{const e=emp(r.empId);csv+=`"${e?e.name:''}",${e?e.code:''},${r.presentDays}/${r.workDays},${r.basic},${r.hra},${r.conv},${r.med},${r.gross},${r.pf},${r.esic},${r.pt},${r.net}\n`;});
  dlCSV(csv,'payroll_'+payMonth+'.csv');
}
function dlCSV(csv,name){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=name;a.click();
  toast('Downloaded '+name);
}

/* ================= REPORTS ================= */
function vReports(){
  const emps=activeEmps();
  const byDept={};DEPTS.forEach(d=>byDept[d]={count:0,cost:0});
  emps.forEach(e=>{const c=calcSalary(e,1,1);byDept[e.dept].count++;byDept[e.dept].cost+=c.gross;});
  const totCost=Object.values(byDept).reduce((s,d)=>s+d.cost,0);
  const mk=monthKey(),att=monthAttSummary(mk);
  const attRows=emps.map(e=>{const a=att[e.id]||{present:0};const pct=att._workDays?Math.round(a.present/att._workDays*100):0;
    return `<tr><td><b>${esc(e.name)}</b></td><td class="num">${a.present} / ${att._workDays}</td><td class="num"><b style="color:${pct>=90?'var(--green)':pct>=75?'var(--amber)':'var(--red)'}">${pct}%</b></td></tr>`;}).join('');
  const payHist=Object.keys(S.payrolls).sort().reverse().map(k=>{const run=S.payrolls[k];const net=run.reduce((s,r)=>s+r.net,0);
    return `<tr><td><b>${MONTHS[+k.slice(5)-1]} ${k.slice(0,4)}</b></td><td class="num">${run.length}</td><td class="num">${fmtMoney(net)}</td></tr>`;}).join('');
  return `<div class="page-head"><div><h2>Reports</h2><div class="sub2">Headcount, salary cost, attendance &amp; payroll history</div></div>
    <button class="btn btn-outline" onclick="csvEmployees()">⬇ Employee Master CSV</button></div>
  <div class="grid-2">
    <div class="card"><h3>Monthly Salary Cost by Department (full attendance)</h3>
      <table class="tbl"><thead><tr><th>Department</th><th class="num">Employees</th><th class="num">Gross Cost / mo</th></tr></thead><tbody>
      ${DEPTS.map(d=>`<tr><td>${d}</td><td class="num">${byDept[d].count}</td><td class="num">${fmtMoney(byDept[d].cost)}</td></tr>`).join('')}
      <tr style="background:var(--light)"><td><b>Total</b></td><td class="num"><b>${emps.length}</b></td><td class="num"><b>${fmtMoney(totCost)}</b></td></tr></tbody></table></div>
    <div class="card"><h3>Attendance % — ${MONTHS[+mk.slice(5)-1]} ${mk.slice(0,4)}</h3>
      <table class="tbl"><thead><tr><th>Employee</th><th class="num">Days</th><th class="num">%</th></tr></thead><tbody>${attRows}</tbody></table></div>
  </div>
  <div class="card mt"><h3>Payroll History</h3>
    ${payHist?`<table class="tbl"><thead><tr><th>Month</th><th class="num">Employees Paid</th><th class="num">Total Net Payout</th></tr></thead><tbody>${payHist}</tbody></table>`:'<div class="empty">No payroll runs yet — process one from the Payroll page.</div>'}</div>`;
}
function csvEmployees(){
  let csv='Code,Name,Department,Designation,DOJ,DOB,Phone,Email,Basic,Status\n';
  S.employees.forEach(e=>{csv+=`${e.code},"${e.name}",${e.dept},"${e.desig}",${e.doj},${e.dob},"${e.phone}","${e.email}",${e.basic},${e.status}\n`;});
  dlCSV(csv,'employees.csv');
}

/* ================= SETTINGS ================= */
function vSettings(){
  const st=S.settings,co=S.company;
  return `<div class="page-head"><div><h2>Settings</h2><div class="sub2">Company profile &amp; statutory rates used in payroll</div></div></div>
  <div class="grid-2" style="align-items:start">
    <div class="card"><h3>Company Profile</h3>
      <div class="fg"><label>Company Name</label><input id="s_name" value="${esc(co.name)}"></div>
      <div class="fg"><label>Address</label><input id="s_address" value="${esc(co.address)}"></div>
      <div class="f-row"><div class="fg"><label>Phone</label><input id="s_phone" value="${esc(co.phone)}"></div><div class="fg"><label>Email</label><input id="s_email" value="${esc(co.email)}"></div></div>
    </div>
    <div class="card"><h3>Salary Structure &amp; Statutory Rates</h3>
      <div class="f-row"><div class="fg"><label>HRA (% of basic)</label><input id="s_hraPct" type="number" value="${st.hraPct}"></div><div class="fg"><label>PF (% of basic)</label><input id="s_pfPct" type="number" value="${st.pfPct}"></div></div>
      <div class="f-row"><div class="fg"><label>Conveyance (₹/mo)</label><input id="s_convAmt" type="number" value="${st.convAmt}"></div><div class="fg"><label>Medical (₹/mo)</label><input id="s_medAmt" type="number" value="${st.medAmt}"></div></div>
      <div class="f-row"><div class="fg"><label>ESIC (% of gross)</label><input id="s_esicPct" type="number" step="0.05" value="${st.esicPct}"></div><div class="fg"><label>ESIC gross limit (₹)</label><input id="s_esicLimit" type="number" value="${st.esicLimit}"></div></div>
      <div class="f-row"><div class="fg"><label>Prof. Tax (₹/mo)</label><input id="s_ptAmt" type="number" value="${st.ptAmt}"></div><div class="fg"><label>PT basic threshold (₹)</label><input id="s_ptLimit" type="number" value="${st.ptLimit}"></div></div>
    </div>
  </div>
  <div class="mt" style="display:flex;gap:10px">
    <button class="btn btn-red" onclick="settingsSave()">Save Settings</button>
    <button class="btn btn-outline" onclick="exportData()">⬇ Backup Data (JSON)</button>
    <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">⬆ Restore Data</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
    <button class="btn btn-danger" onclick="resetData()">Reset to Sample Data</button>
  </div>`;
}
function settingsSave(){
  const g=x=>document.getElementById('s_'+x).value;
  S.company={name:g('name'),address:g('address'),phone:g('phone'),email:g('email')};
  S.settings={hraPct:+g('hraPct'),convAmt:+g('convAmt'),medAmt:+g('medAmt'),pfPct:+g('pfPct'),esicPct:+g('esicPct'),esicLimit:+g('esicLimit'),ptAmt:+g('ptAmt'),ptLimit:+g('ptLimit')};
  save();toast('Settings saved');
}
function exportData(){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));a.download='rsinfotech_hrms_backup_'+todayStr()+'.json';a.click();toast('Backup downloaded');
}
function importData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.employees)throw 0;S=d;save();render();toast('Data restored');}catch(e){toast('Invalid backup file');}};
  r.readAsText(f);inp.value='';
}
function resetData(){if(!confirm('Erase all current data and reload sample data?'))return;S=seed();save();render();toast('Sample data restored');}

/* ================= INIT ================= */
load();
if(sessionStorage.getItem('rs_auth')==='1')showApp();
</script>
</body>
</html>
